# Trading Service 配置文件
# 复制此文件为 config.local.yaml 并修改敏感配置（不会提交到 git）

# 服务配置
host: "0.0.0.0"
port: 8001
debug: false

# 数据库配置（共享 SQLite）
db_path: "~/projects/db/news.db"

# News Service API 配置
news_service_base_url: "http://127.0.0.1:8000"
news_service_timeout: 30

# 交易所配置
binance_api_key: ""
binance_api_secret: ""

# LLM 配置（OpenAI 兼容 API，支持 DeepSeek、通义千问、火山引擎等）
# llm_base_url: "https://api.openai.com/v1"
# llm_api_key: ""
# llm_model: "gpt-4o-mini"

# 贴文配置
# posts_enabled: true
# posts_dir: "~/projects/trading-service/mydata/posts"

# postx 发布配置（发布到 Binance Square，依赖 binance-service 包）
# postx_enabled: false
# postx_storage_state_path: "~/.binance-service/storage_state.json"
# postx_headless: true
# postx_timeframe: "1h"
# postx_debug: false
